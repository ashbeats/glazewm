<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlazeWM Config Editor - ReactFlow</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@reactflow/core@11/dist/umd/index.js"></script>
    <script src="https://unpkg.com/@reactflow/system@11/dist/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@reactflow/core@11/dist/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #333;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .flowchart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 2px solid #e0e0e0;
        }

        .flowchart-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .flowchart-canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .editor-section {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }

        .editor-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .editor-content::-webkit-scrollbar {
            width: 8px;
        }

        .editor-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .editor-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .editor-content::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .info-box {
            background: #f0f8f4;
            border-left: 4px solid #28a745;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
        }

        .info-box.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
            color: #856404;
        }

        .info-box.error {
            background: #ffe6e6;
            border-left-color: #dc3545;
            color: #721c24;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            background: #f9f9f9;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
            font-family: 'Courier New', monospace;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 8px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            transition: all 0.2s ease;
            color: #667eea;
        }

        .control-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Custom Node Styles */
        .react-flow__node {
            border-radius: 8px;
            border-width: 2px;
            background: white;
            transition: all 0.2s ease;
        }

        .react-flow__node.config-node {
            border-color: #667eea;
        }

        .react-flow__node.config-node.selected {
            background: #667eea;
            color: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
        }

        .react-flow__node.leaf-node {
            border-color: #28a745;
        }

        .react-flow__node.leaf-node.selected {
            background: #28a745;
            color: white;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.2);
        }

        .react-flow__node.no-keybindings {
            border-color: #dc3545;
            background: #ffe6e6;
        }

        .react-flow__node.no-keybindings.selected {
            background: #dc3545;
            color: white;
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.2);
        }

        .node-label {
            font-weight: 600;
            font-size: 13px;
            padding: 8px 12px;
            text-align: center;
        }

        .react-flow__edge {
            stroke-width: 2;
            stroke: #ddd;
        }

        .react-flow__edge.selected {
            stroke: #667eea;
            stroke-width: 2;
        }

        .react-flow__connection {
            stroke: #667eea;
            stroke-width: 2;
        }

        .react-flow__connection-path {
            stroke: #667eea;
        }

        .legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border: 2px solid;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-color.config {
            border-color: #667eea;
            background: white;
        }

        .legend-color.leaf {
            border-color: #28a745;
            background: white;
        }

        .legend-color.no-keys {
            border-color: #dc3545;
            background: #ffe6e6;
        }

        @media (max-width: 768px) {
            .editor-section {
                display: none;
            }
        }

        .json-preview {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            line-height: 1.4;
            color: #333;
        }

        .no-selection {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .no-selection svg {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useCallback, useEffect, useState } = React;
        const ReactFlow = window.ReactFlow.ReactFlow;
        const Background = window.ReactFlow.Background;
        const Controls = window.ReactFlow.Controls;
        const MiniMap = window.ReactFlow.MiniMap;
        const useNodesState = window.ReactFlow.useNodesState;
        const useEdgesState = window.ReactFlow.useEdgesState;
        const Handle = window.ReactFlow.Handle;
        const Position = window.ReactFlow.Position;

        // Schema Data
        const schemaData = {
            ParsedConfig: {
                type: 'root',
                description: 'Root configuration object for GlazeWM',
                children: ['binding_modes', 'gaps', 'general', 'keybindings', 'window_behavior', 'window_effects', 'window_rules', 'workspaces'],
                hasKeybindings: true,
                level: 0
            },
            binding_modes: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Collection of custom binding modes',
                children: ['BindingModeConfig'],
                hasKeybindings: true,
                level: 1
            },
            BindingModeConfig: {
                type: 'struct',
                parent: 'binding_modes',
                description: 'Individual binding mode configuration',
                children: ['name', 'display_name', 'keybindings'],
                hasKeybindings: true,
                level: 2
            },
            gaps: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Window spacing and margins configuration',
                children: ['scale_with_dpi', 'inner_gap', 'outer_gap', 'single_window_outer_gap'],
                hasKeybindings: false,
                level: 1
            },
            general: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Global window manager behavior settings',
                children: ['cursor_jump', 'focus_follows_cursor', 'startup_commands', 'hide_method'],
                hasKeybindings: false,
                level: 1
            },
            keybindings: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Global keyboard shortcuts',
                children: ['KeybindingConfig'],
                hasKeybindings: true,
                level: 1
            },
            KeybindingConfig: {
                type: 'struct',
                parent: 'keybindings',
                description: 'Individual keybinding with commands',
                children: ['bindings', 'commands'],
                hasKeybindings: false,
                level: 2
            },
            window_behavior: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Default behavior for new windows',
                children: ['initial_state', 'state_defaults'],
                hasKeybindings: false,
                level: 1
            },
            window_effects: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Visual styling for focused and unfocused windows',
                children: ['focused_window', 'other_windows'],
                hasKeybindings: false,
                level: 1
            },
            window_rules: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Rules for applying commands to specific windows',
                children: ['WindowRuleConfig'],
                hasKeybindings: false,
                level: 1
            },
            WindowRuleConfig: {
                type: 'struct',
                parent: 'window_rules',
                description: 'Individual window rule configuration',
                children: ['commands', 'match_window', 'on', 'run_once'],
                hasKeybindings: false,
                level: 2
            },
            workspaces: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Virtual workspace definitions',
                children: ['WorkspaceConfig'],
                hasKeybindings: false,
                level: 1
            },
            WorkspaceConfig: {
                type: 'struct',
                parent: 'workspaces',
                description: 'Individual workspace configuration (❌ NO KEYBINDINGS)',
                children: ['name', 'display_name', 'bind_to_monitor', 'keep_alive'],
                hasKeybindings: false,
                noKeybindings: true,
                level: 2
            }
        };

        // Custom Node Component
        const CustomNode = ({ data, selected }) => {
            const nodeInfo = data.nodeInfo;
            let nodeClass = 'config-node';
            if (nodeInfo.children && nodeInfo.children.length > 0) {
                nodeClass = 'leaf-node';
            }
            if (nodeInfo.noKeybindings) {
                nodeClass = 'no-keybindings';
            }

            return (
                <div className={`node-label ${selected ? 'selected' : ''}`} style={{ color: selected && nodeClass === 'leaf-node' ? 'white' : 'inherit' }}>
                    <Handle type="target" position={Position.Top} />
                    <div>{data.label}</div>
                    <div style={{ fontSize: '10px', opacity: 0.7, marginTop: '2px' }}>
                        {nodeInfo.type}
                    </div>
                    <Handle type="source" position={Position.Bottom} />
                </div>
            );
        };

        function ConfigEditor() {
            const [nodes, setNodes, onNodesChange] = useNodesState([]);
            const [edges, setEdges, onEdgesChange] = useEdgesState([]);
            const [selectedNode, setSelectedNode] = useState(null);
            const [nodeConfig, setNodeConfig] = useState(null);

            // Initialize graph
            useEffect(() => {
                const newNodes = [];
                const newEdges = [];
                const nodePositions = {};
                const layers = {};

                // Organize by levels
                Object.keys(schemaData).forEach(name => {
                    const level = schemaData[name].level;
                    if (!layers[level]) layers[level] = [];
                    layers[level].push(name);
                });

                // Position nodes
                Object.keys(layers).forEach(levelKey => {
                    const level = parseInt(levelKey);
                    const nodes = layers[level];
                    const spacing = 250;
                    nodes.forEach((name, idx) => {
                        nodePositions[name] = {
                            x: idx * spacing - (nodes.length * spacing) / 2,
                            y: level * 200
                        };
                    });
                });

                // Create nodes
                Object.keys(schemaData).forEach(name => {
                    const schema = schemaData[name];
                    let nodeClass = 'config-node';
                    if (schema.children && schema.children.length > 0) {
                        nodeClass = 'leaf-node';
                    }
                    if (schema.noKeybindings) {
                        nodeClass = 'no-keybindings';
                    }

                    newNodes.push({
                        id: name,
                        data: {
                            label: name,
                            nodeInfo: {
                                type: schema.type,
                                children: schema.children || [],
                                hasKeybindings: schema.hasKeybindings,
                                noKeybindings: schema.noKeybindings,
                                description: schema.description,
                                parent: schema.parent
                            }
                        },
                        position: nodePositions[name],
                        type: 'default'
                    });
                });

                // Create edges
                Object.keys(schemaData).forEach(name => {
                    const schema = schemaData[name];
                    if (schema.children) {
                        schema.children.forEach(child => {
                            if (schemaData[child]) {
                                newEdges.push({
                                    id: `${name}-${child}`,
                                    source: name,
                                    target: child,
                                    animated: false,
                                    style: { stroke: '#999' }
                                });
                            }
                        });
                    }
                });

                setNodes(newNodes);
                setEdges(newEdges);
            }, []);

            const onNodeClick = useCallback((e, node) => {
                setSelectedNode(node.id);
                const schema = schemaData[node.id];
                setNodeConfig({
                    name: node.id,
                    type: schema.type,
                    description: schema.description,
                    parent: schema.parent || 'N/A',
                    children: schema.children || [],
                    hasKeybindings: schema.hasKeybindings,
                    noKeybindings: schema.noKeybindings
                });
            }, []);

            const exportConfig = () => {
                const config = {
                    ParsedConfig: {
                        binding_modes: [],
                        gaps: {},
                        general: {},
                        keybindings: [],
                        window_behavior: {},
                        window_effects: {},
                        window_rules: [],
                        workspaces: []
                    }
                };
                const json = JSON.stringify(config, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'glazewm-config.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            const copyToClipboard = () => {
                if (nodeConfig) {
                    const text = JSON.stringify(nodeConfig, null, 2);
                    navigator.clipboard.writeText(text).then(() => {
                        alert('✅ Copied to clipboard!');
                    });
                }
            };

            const clearSelection = () => {
                setSelectedNode(null);
                setNodeConfig(null);
            };

            return (
                <div className="app-container">
                    <div className="flowchart-section">
                        <div className="flowchart-header">
                            <div className="header-title">
                                <span>📊</span>
                                <span>GlazeWM Config Schema</span>
                            </div>
                        </div>
                        <div className="flowchart-canvas">
                            <ReactFlow
                                nodes={nodes.map(node => ({
                                    ...node,
                                    selected: node.id === selectedNode
                                }))}
                                edges={edges}
                                onNodesChange={onNodesChange}
                                onEdgesChange={onEdgesChange}
                                onNodeClick={onNodeClick}
                                nodeTypes={{ default: CustomNode }}
                                fitView
                            >
                                <Background />
                                <Controls />
                                <MiniMap />
                            </ReactFlow>
                        </div>
                    </div>

                    <div className="editor-section">
                        <div className="editor-header">
                            <span>✏️</span>
                            <span>Properties</span>
                        </div>
                        <div className="editor-content">
                            <div className="controls">
                                <button className="control-btn" onClick={exportConfig}>📥 Export</button>
                                <button className="control-btn" onClick={clearSelection}>✕ Clear</button>
                            </div>

                            <div className="legend">
                                <div className="legend-item">
                                    <div className="legend-color config"></div>
                                    <span>Config</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-color leaf"></div>
                                    <span>Has Children</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-color no-keys"></div>
                                    <span>No Keybindings</span>
                                </div>
                            </div>

                            {nodeConfig ? (
                                <>
                                    {nodeConfig.noKeybindings && (
                                        <div className="info-box error">
                                            ⚠️ This node does NOT support keybindings
                                        </div>
                                    )}
                                    {nodeConfig.hasKeybindings && !nodeConfig.noKeybindings && (
                                        <div className="info-box">
                                            ✅ This node supports keybindings
                                        </div>
                                    )}

                                    <div className="form-group">
                                        <label>Node Name</label>
                                        <input type="text" value={nodeConfig.name} readOnly />
                                    </div>

                                    <div className="form-group">
                                        <label>Type</label>
                                        <input type="text" value={nodeConfig.type} readOnly />
                                    </div>

                                    <div className="form-group">
                                        <label>Parent Node</label>
                                        <input type="text" value={nodeConfig.parent} readOnly />
                                    </div>

                                    <div className="form-group">
                                        <label>Description</label>
                                        <textarea readOnly value={nodeConfig.description}></textarea>
                                    </div>

                                    {nodeConfig.children.length > 0 && (
                                        <div className="form-group">
                                            <label>Children ({nodeConfig.children.length})</label>
                                            <div className="json-preview">
                                                {JSON.stringify(nodeConfig.children, null, 2)}
                                            </div>
                                        </div>
                                    )}

                                    <div className="button-group">
                                        <button className="btn-primary" onClick={copyToClipboard}>Copy JSON</button>
                                    </div>
                                </>
                            ) : (
                                <div className="no-selection">
                                    <div style={{ fontSize: '24px', marginBottom: '10px' }}>👆</div>
                                    <div>Click a node to view properties</div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ConfigEditor />);
    </script>
</body>
</html>
