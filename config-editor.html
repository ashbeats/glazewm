<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlazeWM Config Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #333;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .flowchart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 2px solid #e0e0e0;
        }

        .flowchart-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .flowchart-canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #fafafa;
        }

        .editor-section {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
            border-left: 2px solid #e0e0e0;
        }

        .editor-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .editor-content::-webkit-scrollbar {
            width: 8px;
        }

        .editor-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .editor-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .editor-content::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg:active {
            cursor: grabbing;
        }

        .node-group {
            cursor: pointer;
        }

        .node-rect {
            fill: white;
            stroke: #667eea;
            stroke-width: 2;
            transition: all 0.2s ease;
        }

        .node-group:hover .node-rect {
            filter: brightness(0.95);
            stroke-width: 2.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .node-group.selected .node-rect {
            fill: #667eea;
            stroke: #764ba2;
            stroke-width: 3;
        }

        .node-group.leaf .node-rect {
            stroke: #28a745;
        }

        .node-group.leaf.selected .node-rect {
            fill: #28a745;
        }

        .node-group.no-keybindings .node-rect {
            stroke: #dc3545;
            fill: #ffe6e6;
        }

        .node-group.no-keybindings.selected .node-rect {
            fill: #dc3545;
            stroke: #a02622;
        }

        .node-text {
            font-size: 13px;
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
            fill: #333;
        }

        .node-group.selected .node-text {
            fill: white;
        }

        .node-type {
            font-size: 10px;
            opacity: 0.7;
            pointer-events: none;
            text-anchor: middle;
            fill: #666;
        }

        .node-group.selected .node-type {
            fill: rgba(255,255,255,0.9);
        }

        .edge {
            stroke: #999;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .info-box {
            background: #f0f8f4;
            border-left: 4px solid #28a745;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
        }

        .info-box.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
            color: #856404;
        }

        .info-box.error {
            background: #ffe6e6;
            border-left-color: #dc3545;
            color: #721c24;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            background: #f9f9f9;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
            font-family: 'Courier New', monospace;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 8px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            transition: all 0.2s ease;
            color: #667eea;
        }

        .control-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border: 2px solid;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-color.config {
            border-color: #667eea;
            background: white;
        }

        .legend-color.leaf {
            border-color: #28a745;
            background: white;
        }

        .legend-color.no-keys {
            border-color: #dc3545;
            background: #ffe6e6;
        }

        .json-preview {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
            line-height: 1.4;
            color: #333;
            word-break: break-all;
        }

        .no-selection {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: white;
            padding: 8px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 100;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            padding: 0;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .zoom-level {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .editor-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="flowchart-section">
            <div class="flowchart-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span>📊</span>
                    <span>GlazeWM Config Schema</span>
                </div>
            </div>
            <div class="flowchart-canvas">
                <svg id="flowchart"></svg>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                    <div class="zoom-level" id="zoomLevel">100%</div>
                    <button class="zoom-btn" onclick="zoomOut()">−</button>
                    <button class="zoom-btn" onclick="resetView()" title="Reset">↺</button>
                </div>
            </div>
        </div>

        <div class="editor-section">
            <div class="editor-header">
                <span>✏️</span>
                <span>Properties</span>
            </div>
            <div class="editor-content" id="editorContent">
                <div class="no-selection">
                    <div style="font-size: 24px; margin-bottom: 10px;">👆</div>
                    <div>Click a node to view properties</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Schema Data
        const schemaData = {
            ParsedConfig: {
                type: 'root',
                description: 'Root configuration object for GlazeWM',
                children: ['binding_modes', 'gaps', 'general', 'keybindings', 'window_behavior', 'window_effects', 'window_rules', 'workspaces'],
                hasKeybindings: true,
                level: 0
            },
            binding_modes: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Collection of custom binding modes',
                children: ['BindingModeConfig'],
                hasKeybindings: true,
                level: 1
            },
            BindingModeConfig: {
                type: 'struct',
                parent: 'binding_modes',
                description: 'Individual binding mode configuration',
                children: ['name', 'display_name', 'keybindings'],
                hasKeybindings: true,
                level: 2
            },
            gaps: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Window spacing and margins configuration',
                children: ['scale_with_dpi', 'inner_gap', 'outer_gap', 'single_window_outer_gap'],
                hasKeybindings: false,
                level: 1
            },
            general: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Global window manager behavior settings',
                children: ['cursor_jump', 'focus_follows_cursor', 'startup_commands', 'hide_method'],
                hasKeybindings: false,
                level: 1
            },
            keybindings: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Global keyboard shortcuts',
                children: ['KeybindingConfig'],
                hasKeybindings: true,
                level: 1
            },
            KeybindingConfig: {
                type: 'struct',
                parent: 'keybindings',
                description: 'Individual keybinding with commands',
                children: ['bindings', 'commands'],
                hasKeybindings: false,
                level: 2
            },
            window_behavior: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Default behavior for new windows',
                children: ['initial_state', 'state_defaults'],
                hasKeybindings: false,
                level: 1
            },
            window_effects: {
                type: 'struct',
                parent: 'ParsedConfig',
                description: 'Visual styling for focused and unfocused windows',
                children: ['focused_window', 'other_windows'],
                hasKeybindings: false,
                level: 1
            },
            window_rules: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Rules for applying commands to specific windows',
                children: ['WindowRuleConfig'],
                hasKeybindings: false,
                level: 1
            },
            WindowRuleConfig: {
                type: 'struct',
                parent: 'window_rules',
                description: 'Individual window rule configuration',
                children: ['commands', 'match_window', 'on', 'run_once'],
                hasKeybindings: false,
                level: 2
            },
            workspaces: {
                type: 'array',
                parent: 'ParsedConfig',
                description: 'Virtual workspace definitions',
                children: ['WorkspaceConfig'],
                hasKeybindings: false,
                level: 1
            },
            WorkspaceConfig: {
                type: 'struct',
                parent: 'workspaces',
                description: 'Individual workspace configuration (❌ NO KEYBINDINGS)',
                children: ['name', 'display_name', 'bind_to_monitor', 'keep_alive'],
                hasKeybindings: false,
                noKeybindings: true,
                level: 2
            }
        };

        let selectedNode = null;
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let nodePositions = {};
        let svgGroup = null;

        function initFlowchart() {
            const svg = document.getElementById('flowchart');
            const width = svg.clientWidth;
            const height = svg.clientHeight;

            // Add arrow marker
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '10');
            marker.setAttribute('markerHeight', '10');
            marker.setAttribute('refX', '9');
            marker.setAttribute('refY', '3');
            marker.setAttribute('orient', 'auto');
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '0 0, 10 3, 0 6');
            polygon.setAttribute('fill', '#999');
            marker.appendChild(polygon);
            defs.appendChild(marker);
            svg.appendChild(defs);

            // Create main group for transform
            svgGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            svg.appendChild(svgGroup);

            // Organize nodes by level
            const layers = {};
            Object.keys(schemaData).forEach(name => {
                const level = schemaData[name].level;
                if (!layers[level]) layers[level] = [];
                layers[level].push(name);
            });

            // Position nodes
            Object.keys(layers).forEach(levelKey => {
                const level = parseInt(levelKey);
                const nodes = layers[level];
                const spacing = 250;
                nodes.forEach((name, idx) => {
                    nodePositions[name] = {
                        x: idx * spacing - (nodes.length * spacing) / 2,
                        y: level * 200
                    };
                });
            });

            // Draw edges first (so they appear behind nodes)
            Object.keys(schemaData).forEach(name => {
                const schema = schemaData[name];
                if (schema.children) {
                    schema.children.forEach(child => {
                        if (nodePositions[child]) {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('class', 'edge');
                            line.setAttribute('x1', nodePositions[name].x);
                            line.setAttribute('y1', nodePositions[name].y + 40);
                            line.setAttribute('x2', nodePositions[child].x);
                            line.setAttribute('y2', nodePositions[child].y - 40);
                            svgGroup.appendChild(line);
                        }
                    });
                }
            });

            // Draw nodes on top
            Object.keys(nodePositions).forEach(name => {
                const pos = nodePositions[name];
                const schema = schemaData[name];
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'node-group');
                g.setAttribute('data-node', name);

                if (schema.children && schema.children.length > 0) {
                    g.classList.add('leaf');
                }
                if (schema.noKeybindings) {
                    g.classList.add('no-keybindings');
                }

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('class', 'node-rect');
                rect.setAttribute('x', pos.x - 70);
                rect.setAttribute('y', pos.y - 40);
                rect.setAttribute('width', '140');
                rect.setAttribute('height', '80');
                rect.setAttribute('rx', '6');

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'node-text');
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y - 5);
                text.textContent = name;

                const typeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                typeText.setAttribute('class', 'node-type');
                typeText.setAttribute('x', pos.x);
                typeText.setAttribute('y', pos.y + 15);
                typeText.textContent = schema.type;

                g.appendChild(rect);
                g.appendChild(text);
                g.appendChild(typeText);

                g.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectNode(name);
                });

                svgGroup.appendChild(g);
            });

            // SVG mouse events
            const svg_elem = document.getElementById('flowchart');
            
            svg_elem.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                zoomLevel = Math.max(0.5, Math.min(3, zoomLevel * delta));
                updateView();
            });

            let panning = false;
            let startX, startY;

            svg_elem.addEventListener('mousedown', (e) => {
                if (e.target === svg_elem || e.target.tagName === 'line') {
                    panning = true;
                    startX = e.clientX;
                    startY = e.clientY;
                }
            });

            svg_elem.addEventListener('mousemove', (e) => {
                if (panning) {
                    panX += e.clientX - startX;
                    panY += e.clientY - startY;
                    startX = e.clientX;
                    startY = e.clientY;
                    updateView();
                }
            });

            svg_elem.addEventListener('mouseup', () => {
                panning = false;
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') clearSelection();
            });
        }

        function updateView() {
            if (svgGroup) {
                svgGroup.setAttribute('transform', `translate(${panX}, ${panY}) scale(${zoomLevel})`);
            }
            document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%';
        }

        function selectNode(name) {
            selectedNode = name;
            const schema = schemaData[name];
            
            // Update visual selection
            document.querySelectorAll('.node-group').forEach(n => {
                n.classList.remove('selected');
            });
            document.querySelector(`[data-node="${name}"]`).classList.add('selected');
            
            // Update properties panel
            updatePropertyPanel(name, schema);
        }

        function updatePropertyPanel(name, schema) {
            const content = document.getElementById('editorContent');
            let html = '';

            html += '<div class="controls">';
            html += '<button class="control-btn" onclick="exportConfig()">📥 Export</button>';
            html += '<button class="control-btn" onclick="clearSelection()">✕ Clear</button>';
            html += '</div>';

            html += '<div class="legend">';
            html += '<div class="legend-item"><div class="legend-color config"></div><span>Config</span></div>';
            html += '<div class="legend-item"><div class="legend-color leaf"></div><span>Has Children</span></div>';
            html += '<div class="legend-item"><div class="legend-color no-keys"></div><span>No Keybindings</span></div>';
            html += '</div>';

            if (schema.noKeybindings) {
                html += '<div class="info-box error">⚠️ This node does NOT support keybindings</div>';
            } else if (schema.hasKeybindings) {
                html += '<div class="info-box">✅ This node supports keybindings</div>';
            }

            html += '<div class="form-group">';
            html += '<label>Node Name</label>';
            html += `<input type="text" value="${name}" readonly>`;
            html += '</div>';

            html += '<div class="form-group">';
            html += '<label>Type</label>';
            html += `<input type="text" value="${schema.type}" readonly>`;
            html += '</div>';

            html += '<div class="form-group">';
            html += '<label>Parent Node</label>';
            html += `<input type="text" value="${schema.parent || 'N/A'}" readonly>`;
            html += '</div>';

            html += '<div class="form-group">';
            html += '<label>Description</label>';
            html += `<textarea readonly>${schema.description}</textarea>`;
            html += '</div>';

            if (schema.children && schema.children.length > 0) {
                html += '<div class="form-group">';
                html += `<label>Children (${schema.children.length})</label>`;
                html += `<div class="json-preview">${JSON.stringify(schema.children, null, 2)}</div>`;
                html += '</div>';
            }

            html += '<div class="button-group"><button class="btn-primary" onclick="copyToClipboard()">Copy JSON</button></div>';

            content.innerHTML = html;
        }

        function copyToClipboard() {
            if (selectedNode) {
                const schema = schemaData[selectedNode];
                const text = JSON.stringify({
                    name: selectedNode,
                    type: schema.type,
                    description: schema.description,
                    children: schema.children || [],
                    parent: schema.parent || 'N/A'
                }, null, 2);
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ Copied to clipboard!');
                });
            }
        }

        function clearSelection() {
            selectedNode = null;
            document.querySelectorAll('.node-group').forEach(n => n.classList.remove('selected'));
            document.getElementById('editorContent').innerHTML = '<div class="no-selection"><div style="font-size: 24px; margin-bottom: 10px;">👆</div><div>Click a node to view properties</div></div>';
        }

        function exportConfig() {
            const config = { ParsedConfig: {} };
            const json = JSON.stringify(config, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'glazewm-config.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function zoomIn() {
            zoomLevel = Math.min(3, zoomLevel * 1.2);
            updateView();
        }

        function zoomOut() {
            zoomLevel = Math.max(0.5, zoomLevel / 1.2);
            updateView();
        }

        function resetView() {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            clearSelection();
            updateView();
        }

        window.addEventListener('load', initFlowchart);
    </script>
</body>
</html>
